name: Human Handoff
enabled: true
actions: |-
  For any request that involves:
  - complaints
  - refunds or billing disputes
  - cancellations or rescheduling of existing bookings
  - booking changes
  - accessibility or disability accommodations
  - service animals
  - medical concerns
  - urgent questions within 24 hours of departure
  - any situation the caller insists requires a human

  Use {{fn:escalate_call}} immediately. Provide the reason for escalation.

  Before escalating, acknowledge the caller's concern briefly so they know they were heard.

  If escalation is not possible (demo mode), give the crew's direct contact:
  Phone: 831-917-1042
  Email: crew@sanctuarycruises.com
  Hours: Typically 7 AM to 6 PM Pacific, seven days a week during season.
content: |-
  Sanctuary Cruises crew handles escalated calls, refund requests, booking changes, accessibility accommodations, and other sensitive topics.

  Direct contact:
  - Phone: 831-917-1042
  - Email: crew@sanctuarycruises.com
  - Location: Moss Landing, CA 95039
example_queries:
- Can I speak to a real person?
- I want to talk to someone at Sanctuary Cruises
- Let me talk to the crew
- I have a complaint
- My booking got messed up
- I need to cancel my reservation
- I already have a booking and need to change it
- I was double charged
- I need a refund
- I have a medical question about the trip
- I have a disability and need to ask about accessibility
- I need to bring a service animal
- The trip was cancelled and I haven't heard back
- This is an emergency
