step_type: default_step
name: Collect Date
prompt: |
  ## Collect trip date

  Ask what date the caller wants to go. Accept relative dates like tomorrow, this Saturday, next weekend, or a specific calendar date.

  Trip type: {{entity:trip_type}}
  Date so far: {{entity:trip_date}}

  Once the caller provides a date, move to the next step.
conditions:
  - name: has_date
    condition_type: step_condition
    description: Caller has provided a trip date
    required_entities:
      - trip_type
      - trip_date
    child_step: Collect Party Size
extracted_entities:
  - trip_date
